# Harper configuration file. Refer to https://docs.harperdb.io/docs/deployments/configuration
---
http:
  compressionThreshold: 0
  cors: false
  corsAccessList:
    - null
  keepAliveTimeout: 30000
  port: null
  securePort: 9926
  mtls: false
  http2: false
  timeout: 120000
threads:
  count: null
  debug: false
authentication:
  authorizeLocal: false
  cacheTTL: 30000
  enableSessions: true
  operationTokenTimeout: 1d
  refreshTokenTimeout: 30d
analytics:
  aggregatePeriod: 60
  replicate: false
applications:
  lockdown: freeze-after-load
  moduleLoader: vm
  dependencyLoader: auto
  allowedSpawnCommands:
    - npm
    - node
  allowedDirectory: app
componentsRoot: null
localStudio:
  enabled: true
logging:
  auditAuthEvents:
    logFailed: false
    logSuccessful: false
  auditLog: true
  auditRetention: 3d
  file: true
  level: warn
  root: null
  rotation:
    enabled: true
    compress: false
    interval: null
    maxSize: 64M
    path: null
  stdStreams: false
mqtt:
  network:
    port: 1883
    securePort: 8883
    mtls: false
  webSocket: true
  requireAuthentication: true
operationsApi:
  network:
    cors: true
    corsAccessList:
      - '*'
    domainSocket: hdb/operations-server
    port: null
    securePort: 9925
rootPath: null
storage:
  writeAsync: false
  caching: true
  compression: true
  noReadAhead: false
  path: null
  prefetchWrites: true
tls:
  privateKey: null
node:
  hostname: null
mcp:
  operations:
    enabled: false
    mountPath: /mcp
    allow:
      - describe_*
      - list_*
      - search_*
      - get_*
      - system_information
      - read_log
      - read_audit_log
    deny: []
    maxTools: 200
    rateLimit:
      perToolPerSecond: 10
      perToolBurst: 20
      sessionConcurrency: 25
      sessionPerSecond: 100
  application:
    enabled: false
    mountPath: /mcp
    allow: []
    deny: []
    maxTools: 500
    searchMaxResults: 100
    rateLimit:
      perToolPerSecond: 25
      perToolBurst: 50
      sessionConcurrency: 50
      sessionPerSecond: 200
  session:
    idleTimeoutSeconds: 1800
    allowClientDelete: true
