name: Update rocksdb-js

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new-rocksdb-js]

permissions:
  contents: read
  pull-requests: write

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check-for-new-release:
    name: Check for new release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get latest version
        id: latest-version
        run: |
          LATEST_VERSION=$(npm view @harperfast/rocksdb-js@latest version)
          echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Install latest rocksdb-js
        run: npm install --save @harperfast/rocksdb-js@latest

      - name: Stage changes
        id: stage-changes
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet package.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub token
        id: github-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Cleanup existing PRs
        if: steps.stage-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: |
          git fetch origin
          BRANCH_NAME="update-rocksdb-js"

          # Check if there's an existing PR for this branch
          if gh pr list --head $BRANCH_NAME --json number --jq '.[0].number' | grep -q .; then
            PR_NUMBER=$(gh pr list --head $BRANCH_NAME --json number --jq '.[0].number')
            echo "Closing existing PR #$PR_NUMBER"
            gh pr close $PR_NUMBER --delete-branch
          fi

          # Delete local branch if it exists
          if git show-ref --verify --quiet refs/heads/$BRANCH_NAME; then
            git branch -D $BRANCH_NAME
          fi

          # Delete remote branch if it exists
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            git push origin --delete $BRANCH_NAME || true
          fi

          # Prune stale remote-tracking branches
          git fetch --prune origin

      - name: Pull request
        if: steps.stage-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.github-token.outputs.token }}
          title: 'chore(deps): Update rocksdb-js to ${{ steps.latest-version.outputs.latest }}'
          body: 'Update rocksdb-js to ${{ steps.latest-version.outputs.latest }}.'
          commit-message: 'chore(deps): Update rocksdb-js to ${{ steps.latest-version.outputs.latest }}'
          committer: 'HarperFast <noreply@harperdb.io>'
          branch: update-rocksdb-js
          delete-branch: true
