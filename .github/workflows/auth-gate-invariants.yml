name: Auth gate invariants

# Validates that the AI workflow auth gate structure is preserved.
# Runs on any PR that touches a `claude-*.yml` workflow file or this
# validator itself.
#
# This is a STRUCTURAL lint, not a semantic test. It catches the
# obvious attacks (delete the authorize job, drop the `needs:`
# dependency, broaden permissions, change the if-expression to a
# tautology). Subtle attacks (e.g., modifying the bash logic inside
# the auth check to admit everyone) are caught by CODEOWNERS review,
# which requires both @HarperFast/developers and @HarperFast/devops
# approval on `.github/` changes.
#
# Defense in depth — make this workflow a REQUIRED status check on
# `main` via branch protection so PRs can't merge without it passing.

on:
  pull_request:
    paths:
      - '.github/workflows/claude-*.yml'
      - '.github/workflows/auth-gate-invariants.yml'
      - '.github/scripts/validate-auth-gate-invariants.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate auth gate structure
        run: bash .github/scripts/validate-auth-gate-invariants.sh
